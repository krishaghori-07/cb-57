<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .board {
            width: 320px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
        }

        .box {
            width: 100px;
            height: 100px;
            background: white;
            color: black;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .box:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }

        .win {
            background: #00ff95 !important;
            color: black;
        }

        #status {
            margin-top: 20px;
            font-size: 22px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #ff9800;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }
    </style>
</head>

<body>
    <h1>tic tac toe</h1>
    <div class="board">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <h2 id="status">player x turn</h2>
    <button onclick="resetGame()">reset </button>
    <script>
        let boxes = document.querySelectorAll(".box");
        let turn = "x";
        let gameOver = false;
        let count = 0;

        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];
        boxes.forEach((box, index) => {
            box.addEventListener("click", () => {
                if (box.innerText === "" && !gameOver) {
                    box.innerText = turn;
                    count++;
                    if (checkWinner()) return;
                    if (count === 9) {
                        document.getElementById("status").innerText = "it's a draw!";
                        gameOver = true;
                        return;
                    }
                    turn=(turn==='x')?"0":"x";
                    document.getElementById("status").innerText="player"+turn+"Turn";
                }
            });
        });
        function checkWinner(){
            for(let pattern of winPatterns){
                let a=boxes[pattern[0]].innerText;
                let b=boxes[pattern[1]].innerText;
                let c=boxes[pattern[2]].innerText;

            if(a!==""&&a===b&&b===c)
            {
                //highlight winner boxes
                boxes[pattern[0]].classList.add("win");
                boxes[pattern[1]].classList.add("win");
                boxes[pattern[2]].classList.add("win");
                  
                let winner=a;
                let loser=(a==="x")?"o":"x";
                document.getElementById("status").innerText="player"+winner+"wins| player "+loser+"lose!";
                gameOver=true;
                return true;
            }
            }
            return false;
        }
        function resetGame(){
            boxes.forEach(box=>
                {
                    box.innerText="";
                    box.classList.remove("win");
                } );
                turn="x";
                gameOver=false;
                count=0;
                document.getElementById("status").innerText="player x turn";
        }
    </script>
</body>

</html>
