<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>
        4th way to create object
    </h1>
    <b>use console</b>
    <script>
        //create class
        class Player{
            constructor(name,runs,ball,four,six)
            {
                //this function will be called automatically when we create object of class such functions are known as callback function.
                this.name=name;
                this.runs=runs;
                this.ball=ball;
                this.four=four;
                this.six=six;
            }
            add()
            {
                console.log(this);//it will display all properties of object
            }
        }
        //now create object using class
        //var object=new class(value)
        var p1=new Player("virat kohli",100,67,5,6);
        p1.add();
        var p2=new Player("shbhman gill",345,678,45,56);
        p2.add();
    </script>
</body>
</html>
