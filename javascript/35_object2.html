<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 bg-light shadow">
                <h1>4th way to create object</h1>
            </div>
            <div class="col-12">
                <div class="row">
                    <div class="col-lg-2 bg-light vh-100 shadow">
                        <form onsubmit="return addPlayer();">
                            <div class="mb-3">
                                <label for="name" class="form-label">name</label>
                                <input type="text" id="name" name="name" class="form-control" required>
                                <div class="invalid-feedback">name is required</div>
                            </div>
                            <div class="mb-3">
                                <label for="runs" class="form-label">runs</label>
                                <input type="number" id="runs" name="runs" class="form-control" min="0" step="1" required>
                                <div class="invalid-feedback">enter runs(0 or more)</div>
                            </div>
                            <div class="mb-3">
                                <label for="balls" class="form-label">balls</label>
                                <input type="number" id="balls" name="balls" class="form-control" min="1" step="1" required>
                                <div class="invalid-feedback">enter balls faced(at least 1)</div>
                            </div>
                            <div class="mb-3">
                                <label for="fours" class="form-label">fours</label>
                                <input type="number" id="fours" name="fours" class="form-control" min="0" step="1" required>
                                <div class="invalid-feedback">enter number of fours(0 or more)</div>
                            </div>
                            <div class="mb-3">
                                <label for="six" class="form-label">six</label>
                                <input type="number" id="six" name="six" class="form-control" min="0" step="1" required>
                                <div class="invalid-feedback">enter number of sixes(0 or more)</div>
                            </div>
                            <button type="submit" class="btn btn-primary">submit</button>
                        </form>
                          </div>
                        <div class="col-lg-10 p-3">
                            <div class="row" id="team">


                            </div>
                        </div>
                  
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
     <script src="https://kit.fontawesome.com/20994dd270.js" crossorigin="anonymous"></script>
     <script>
        function addPlayer()
        {
            //create variables to store input
            var name=document.getElementById('name').value;
            var runs=document.getElementById('runs').value;
            var balls=document.getElementById('balls').value;
            var fours=document.getElementById('fours').value;
            var six=document.getElementById('six').value;
            //now create object using class
            //var object=new class(values)
            var p1=new Player(name,runs,balls,fours,six);//it will run contsructor automatically
            p1.add();

            return false;
        }
        //create class
        class Player{
            //create property variable inside constructor
            constructor(name,runs,ball,four,six)
            {
                //this function will be called automatically when we create ibject of class such functions are known as callback function.
                this.name=name;
                this.runs=runs;
                this.ball=ball;
                this.four=four;
                this.six=six;
            }
            add()
            {
                console.log(this);
                let card=`<div class="col-lg-3">
                    <div class="card-shadow">
                        <div class="card-header text-bg-primary d-flex justify-content-between">
                            <h4>${this.name}</h4>
                            <div>
                                <i class="fa fa-edit"></i>
                                <i class="fa fa-trash"></i>
                            </div>
                        </div>
                        <div class="card-body">
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item  "><b>runs</b> ${this.runs}</li>
                                <li class="list-group-item  "><b>ball</b> ${this.ball}</li>
                                <li class="list-group-item  "><b>fours</b> ${this.four}</li>
                                <li class="list-group-item  "><b>six</b> ${this.six}</li>
                            </ul>
                            </div>
                            </div>
                            </div>`;
                            document.getElementById('team').innerHTML+=card;
            }
        }
     </script>
   

</body>
</html>
