<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <h1>multilevel inheritance</h1>
    <div id="output">

    </div>
    <script>
        var output=document.getElementById('output');
        //create base class/parent class
        class person
        {
            //create constructor to add proprty variable
            constructor(name)
            {
                this.name=name;
                console.log('person class constructor called');
            }
            walk()
            {
                output.innerHTML+=`${this.name}can walk<br/>`;
            }
            talk()
            {
                output.innerHTML+=`${this.name}can talk<br/>`;
            }
        }
        //create sub/child/derived class 
        class student extends person
        {
            //if parent class has constuctor with argument then child class must have constructor with arguments.
            constructor(name,language)
            {
                //must call parent class constructor
                super(name);
                this.language=language;
                console.log('student class constuctor called');
            }
            read()
            {
                output.innerHTML+=`${this.name}can read ${this.language}<br/>`;
            }
            write()
            {
                output.innerHTML+=`${this.name}can write ${this.language}<br/>`;
            }
            WhatICanDo()
            {
                //call parent class walk method
                super.walk();
                //call parent class talk method
                super.talk();
                //call same class method read
                this.read();
                //call same class method write
                this.write();
            }
        }
        //student derived class so it is multi level inheritance
        class developer extends student
        {
            //if parent class has constctor then child class must have constructor.
            constructor(name,language,platform)
            {
                //call parent constructor
                super(name,language);
                this.platform=platform;
            }
            code()
            {
                output.innerHTML+=`${this.name} can write code on ${this.platform}<br/>`;
            }
            debug()
            {
                output.innerHTML+=`${this.name}can write debug on ${this.platform}`;
            }
            //if parent &child both class has same function (name,argument)then it is called method overidding
            WhatICanDo()
            {
                super.WhatICanDo();
                this.code();
                this.debug();
            }
        }
        var d1=new developer("krisha ghori","english","mern");
        d1.WhatICanDo();
    </script>
</body>
</html>
