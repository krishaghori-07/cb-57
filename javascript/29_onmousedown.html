<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div onmousedown="press()" onmouseup="release()"
    style="width:200px;height:100px;background:lightblue;text-align:center;line-height: 100px;">
        click me
    </div>
    <script>
        function press()
        {
            document.body.style.backgroundColor="yellow";
        }
        function release(){
            document.body.style.backgroundColor="white";
        }
    </script>
</body>
</html>
