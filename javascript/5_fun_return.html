<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>prompt function and window.location property</h1>
    <script>
        //prompt function is used to take input from user. 
        //prompt(message,default_value)
        var sitename=prompt("enter your favourite site link","https://chatgpt.com/");
        console.log(sitename);  
        console.error('india',10,3.14,true,false,'Asia');
        console.info('india',10,3.14,true,false,'Asia');
        console.warn('india',10,3.14,true,false,'Asia');
        console.debug('india',10,3.14,true,false,'Asia');
        window.location=sitename;
    </script>
</body>
</html>
