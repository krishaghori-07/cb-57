<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addition program</title>
</head>

<body>
    <h2 align="center">additional calculator</h2>
    <table border="1" align="center" cellpadding="10">
        <tr>
            <td>number 1</td>
            <td><input type="number" id="num1"></td>
        </tr>
        <tr>
            <td>number 2</td>
            <td><input type="number" id="num2"></td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <input type="button" value="add" onclick="addnumbers()">
            </td>
        </tr>
        <tr>
            <td>
                result
            </td>
            <td><span id="result"> </span></td>
        </tr>
    </table>
    <script src="common.js"></script>
    <script>
        function addnumbers()
        {
            let n1=Number(val('num1'));
            let n2=Number(val('num2'));
           if(val('num1') === '' || val('num2') === '')
        {
            alert("please enter numbers");
            return;
        }
        let sum=n1+n2;
       document.getElementById('result').innerHTML = sum;
        }
    </script>
</body>

</html>
