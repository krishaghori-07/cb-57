    <h1>conditional operator</h1>
    <script>
        let now=new Date();
        let hours=now.getHours();
        let minutes=now.getMinutes();
        console.log(hours,minutes);
        let ampm=null;
       // if(hours>12)
   // {
   //     hours=hours-12;
   //     ampm="pm";
   // }
    //else{
    //    ampm="am";
    //}
    let temp=":"+minutes;
    document.write((hours>12)?(hours-12)+temp+"AM":hours+temp+"PM");
    //nesting is also possible in this
    let day =null;
    let dayofweek=now.getDay();
    day=(dayofweek===1)?"monday":(dayofweek===2)?"tuesday":(dayofweek===3)?"wedenesday":(dayofweek===4)?"thurseday":(dayofweek===5)?"friday":(dayofweek===6)?"saturday":"sunday";
    document.write("<br/>"+day); 
    </script>
