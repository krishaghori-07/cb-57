<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hierarchical inheritance</h1>
    <table border="2" cellpadding="10">
        <tr>
            <td>circle area</td>
            <td id="c1"></td>
        </tr>
        <tr>
            <td>cylinder volume</td>
            <td id="c2"></td>
        </tr>
    </table>
    <script>
        //parent class
        class MyMath{
            //create methods
            getSquare(number)
            {
                //variable declared inside method of class/object is called localvariable
                let temp=number*number;
                return temp;
            }
            getPi(){
                let temp = 22 / 7;
                return temp;
            }
        }
        //child class
        class circle extends MyMath
        {
            //radius
            constructor(radius){
                super();
                this.radius=radius;
            }
            getarea()
            {
                //here all variables are local variables
                let pi=super.getPi();
                let Square=super.getSquare(this.radius);
                let Area=pi*Square;
                return Area;
            }
        }
        class cylinder extends MyMath{
            constructor(radius,height)
            {
                super();
                this.radius=radius;
                this.height=height;
            }
            getvolume()
            {
                let pi=super.getPi();
                let square=super.getSquare(this.radius);
                let volume=pi*square*this.height;
                return volume;
            }
        }
        //create circle class object
        var radius=parseInt(prompt("enter radius",0));
        var c1=new circle(radius);
        var area=c1.getarea();
        document.getElementById('c1').innerHTML=area.toFixed(2);

        //create cylinder class object
        var height=parseInt(prompt("enter height",0));
        var c2=new cylinder(radius,height);
        var volume=c2.getvolume();
        document.getElementById('c2').innerHTML=volume.toFixed(3);
    </script>
</body>
</html>
