<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>example of script</h1>
    <h3>example addition,substarction,multiplication</h3>
    <script>
        var  num1=prompt("enter 1st number",1);
        var num2=prompt("enter 2nd number",2);

        num1=parseInt(num1);
        num2=parseInt(num2);

        var addition=num1+num2;
        var substarction=num1-num2;
        var multiplication=num1*num2;
        var division=num1/num2;
        alert("addition"+addition);
        alert("substarction"+substarction);
        alert("multiplication"+multiplication);
        alert("division"+division);
    </script>
</body>
</html>
