<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>event handling</title>
</head>
<body>
    <button id="btn">
        click me
    </button>
    <script>
        let button=document.getElementById("btn");
        button.addEventListener("click",
            function()
            {
                alert("you clicked the button");
            }
        );
    </script>
</body>
</html>
